name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Prepare www folder
        run: |
          mkdir -p www
          cp *.html *.css *.js www/

      - name: Capacitor add android
        run: npx cap add android

      - name: Capacitor sync
        run: npx cap sync android

      - name: Grant execute permission to gradlew
        run: chmod +x android/gradlew

      - name: Build APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Copy APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk ./app-preview.apk

      - name: Get build date
        id: date
        run: echo "value=$(date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.date.outputs.value }}
          name: "Preview ${{ steps.date.outputs.value }}"
          body: |
            Build automático generado el ${{ steps.date.outputs.value }}
            Commit: ${{ github.sha }}
          files: app-preview.apk
          token: ${{ secrets.GITHUB_TOKEN }}
